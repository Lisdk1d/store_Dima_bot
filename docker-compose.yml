services:
  postgres:
    image: postgres:16-alpine
    container_name: gorba_postgres
    restart: unless-stopped
    environment:
      # Must match DB_USER / DB_PASS / DB_NAME in .env
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gorba_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${WEBAPP_PORT:-18080}:8080"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: gorba_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-18000}:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # No API_SECRET_KEY here — the panel authenticates via Telegram WebApp
        # initData, so no secret is baked into the frontend bundle.
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: gorba_frontend
    restart: unless-stopped
    ports:
      - "13000:80"
    depends_on:
      - api

volumes:
  postgres_data:

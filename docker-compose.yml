name: gorba_bot

services:
  postgres:
    image: postgres:16-alpine
    container_name: gorba_postgres
    restart: unless-stopped
    environment:
      # Must match DB_USER / DB_PASS / DB_NAME in .env
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gorba_net

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gorba_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEBAPP_PORT:-18080}:8080"
    networks:
      - gorba_net

volumes:
  postgres_data:

networks:
  gorba_net:
    name: gorba_net
    external: true

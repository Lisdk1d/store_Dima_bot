# Production reverse proxy — terminate HTTPS and forward webhook to bot service.
# Mount this in Caddy/nginx on the VPS alongside docker compose.

# Rate-limit zones (defined in http context).
limit_req_zone $binary_remote_addr zone=edge_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=edge_webhook:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=edge_payment:10m rate=5r/s;

upstream gorba_bot {
    server bot:8080;
}

upstream gorba_api {
    server api:8000;
}

upstream gorba_payment {
    server payment-page:8001;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # HTTPS is terminated here — enforce HSTS. Per-app CSP/headers are set by
    # each backend service (api, payment-page); the admin panel's headers are
    # set by Vercel. HSTS belongs on the TLS edge regardless.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location /webhook {
        limit_req zone=edge_webhook burst=60 nodelay;
        proxy_pass http://gorba_bot;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=edge_api burst=20 nodelay;
        proxy_pass http://gorba_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-API-Key $http_x_api_key;
        proxy_set_header X-Telegram-Init-Data $http_x_telegram_init_data;
    }

    # Customer payment page (Telegram WebApp) — token-gated, no admin auth.
    location /pay/ {
        limit_req zone=edge_payment burst=10 nodelay;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-ancestors https://web.telegram.org https://*.telegram.org" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        proxy_pass http://gorba_payment;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # YooKassa server-to-server payment notifications.
    location /webhooks/yookassa {
        limit_req zone=edge_payment burst=10 nodelay;
        proxy_pass http://gorba_payment;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Admin panel is no longer hosted on this VPS — it's deployed separately on
    # Vercel (see ../Gorba_admin_panel). Bounce the bare domain there.
    location / {
        return 302 https://admin-panel-eight-bay-51.vercel.app/;
    }
}

server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}
